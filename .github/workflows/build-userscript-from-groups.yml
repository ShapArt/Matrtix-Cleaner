name: Build Userscript From Groups

on:
  push:
    branches:
      - main
    paths:
      - '.bootstrap/userscript-groups/**'
      - 'scripts/build_userscript_from_groups.py'
      - '.github/workflows/build-userscript-from-groups.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Assemble userscript
        run: python scripts/build_userscript_from_groups.py

      - name: Commit assembled userscript
        run: |
          if git diff --quiet -- matrix-cleaner.user.js; then
            echo 'No assembled changes detected.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add matrix-cleaner.user.js
          git commit -m 'build: assemble userscript from bootstrap groups'
          git push
